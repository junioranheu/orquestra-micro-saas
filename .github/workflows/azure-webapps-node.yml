name: Deploy Orquestra.Frontend to Azure App Service

on:
  push:
    branches:
      - main  
    paths:
      - Orquestra.Frontend/**

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3️⃣ Instala dependências e build
      - name: Install dependencies and build Next.js
        working-directory: Orquestra.Frontend
        run: |
          npm install
          npm run build

      # 4️⃣ Remove devDependencies (produção)
      - name: Prune dev dependencies
        working-directory: Orquestra.Frontend
        run: npm prune --production

      # 5️⃣ Cria ZIP com os artefatos completos
      - name: Create release.zip
        working-directory: Orquestra.Frontend
        run: |
          zip -r release.zip .next public node_modules package.json next.config.js package-lock.json || true

      # 6️⃣ Deploy para Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'orquestra-web'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_NEXTJS_PUBLISH_PROFILE }}
          package: 'Orquestra.Frontend/release.zip'
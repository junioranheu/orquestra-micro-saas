name: Deploy Orquestra.Frontend to Azure App Service

on:
  push:
    branches:
      - main  # branch de deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # compatível com Next.js + Turbopack

      # 3️⃣ Instala dependências
      - name: Install dependencies
        working-directory: Orquestra.Frontend
        run: npm install

      # 4️⃣ Build Next.js com Turbopack
      - name: Build Next.js with Turbopack
        working-directory: Orquestra.Frontend
        run: npm run build -- --turbopack

      # 5️⃣ Deploy para Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'orquestra-web'  
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_NEXTJS_PUBLISH_PROFILE }}
          package: 'Orquestra.Frontend'

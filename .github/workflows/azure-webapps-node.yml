name: Build & Deploy Next.js to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEBAPP_NAME: "orquestra-web"
  APPLICATION_PUBLISH_PROFILE: ${{ secrets.APP_PUBLISH_PROFILE }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Setup Node 22
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # 3. Instala dependências (Orquestra.Frontend)
      - name: Install dependencies
        run: npm install
        working-directory: Orquestra.Frontend

      # 4. Build Next.js com Turbo (standalone)
      - name: Build Next.js
        run: npx turbo run build --filter=./...
        working-directory: Orquestra.Frontend

      # 5. Prepara artefato para deploy (standalone)
      - name: Prepare artifact
        run: |
          mkdir -p build-zip
          cp -r Orquestra.Frontend/.next/standalone/* build-zip/
          cd build-zip
          zip -r ../build.zip .
          cd ..

      # 6. Deploy no Azure Web App
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ env.APPLICATION_PUBLISH_PROFILE }}
          package: ./build.zip
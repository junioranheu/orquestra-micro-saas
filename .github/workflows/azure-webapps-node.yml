name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      # 1️⃣ Puxa o código
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # compatível com Next.js + Turbopack

      # 3️⃣ Instala dependências
      - name: Install dependencies
        working-directory: Orquestra.Frontend
        run: npm install

      # 4️⃣ Build Turbopack
      - name: Build Next.js with Turbopack
        working-directory: Orquestra.Frontend
        run: npm run build -- --turbopack

      # 5️⃣ Deploy para Azure Static Web Apps
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "Orquestra.Frontend"
          api_location: "Orquestra.Frontend/api"   # necessário pra SSR
          output_location: "Orquestra.Frontend"   # root da app, não precisa ser .next ou out

name: Deploy Orquestra.Frontend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Não precisamos instalar node_modules aqui
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Deploy só do código + package.json + next.config.js + public/.next se houver
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'orquestra-web'       
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_NEXTJS_PUBLISH_PROFILE }}
          package: 'Orquestra.Frontend'

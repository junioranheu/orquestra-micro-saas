name: Build & Deploy Next.js to Azure

on:
  push:
    branches: [ "main" ]

env:
  WEBAPP_NAME: orquestra-web

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build (Turbopack via script)
        run: npm run build

      - name: Prune dev deps (produção)
        run: npm prune --production

      - name: Create release.zip (artifacts necessários)
        run: |
          zip -r release.zip .next public node_modules package.json next.config.js package-lock.json || true
          # Se usar pnpm/yarn, inclua o lockfile correspondente.
      
      - name: Deploy to Azure Web App (publish profile)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_NEXTJS_PUBLISH_PROFILE }}
          package: release.zip
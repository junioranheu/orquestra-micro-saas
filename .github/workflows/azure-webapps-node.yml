name: Deploy Orquestra.Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - Orquestra.Frontend/**

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3️⃣ Instala dependências e build
      - name: Install dependencies and build
        working-directory: Orquestra.Frontend
        run: |
          npm install
          npm run build

      # 4️⃣ Remove devDependencies (produção)
      - name: Prune dev dependencies
        working-directory: Orquestra.Frontend
        run: npm prune --production

      # 5️⃣ Cria ZIP com os artefatos completos
      - name: Create release.zip
        working-directory: Orquestra.Frontend
        run: |
          cd ..
          zip -r release.zip Orquestra.Frontend/.next Orquestra.Frontend/public Orquestra.Frontend/node_modules Orquestra.Frontend/package.json Orquestra.Frontend/next.config.js Orquestra.Frontend/package-lock.json

      # 6️⃣ Deploy para Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'orquestra-web'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_NEXTJS_PUBLISH_PROFILE }}
          package: 'release.zip'
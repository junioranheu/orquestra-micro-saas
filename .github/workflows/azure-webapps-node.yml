name: Deploy Orquestra.Frontend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3️⃣ Instala dependências
      - name: Install dependencies
        working-directory: Orquestra.Frontend
        run: npm install

      # 4️⃣ Limpa build anterior
      - name: Clean .next
        working-directory: Orquestra.Frontend
        run: rm -rf .next

      # 5️⃣ Build Next.js com Turbopack
      - name: Build Next.js
        working-directory: Orquestra.Frontend
        run: npm run build
        env: 
          NEXT_PUBLIC_API_URL_BASE: ${{ secrets.NEXT_PUBLIC_API_URL_BASE }}

      # 6️⃣ Remove devDependencies (opcional)
      - name: Prune dev dependencies
        working-directory: Orquestra.Frontend
        run: npm prune --production

      # 7️⃣ Cria ZIP com os arquivos corretos
      - name: Create release.zip
        working-directory: Orquestra.Frontend
        run: |
          rm -f release.zip
          zip -r release.zip \
            .next \
            node_modules \
            package.json \
            next.config.js \
            public

      # 8️⃣ Deploy para Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'orquestra-web'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_NEXTJS_PUBLISH_PROFILE }}
          package: 'Orquestra.Frontend/release.zip'

# ⚠️ Depois, no Azure App Service configure o startup command:
# node node_modules/next/dist/bin/next start -p $PORT
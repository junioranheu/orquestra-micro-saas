# quota: https://github.com/settings/billing
name: Back-end | Build, test and deploy .NET API to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'Orquestra.API/**'             
      - 'Orquestra.Application/**'      
      - 'Orquestra.Domain/**'           
      - 'Orquestra.Infrastructure/**'   
      - 'Orquestra.IntegrationTests/**'
      - 'Orquestra.UnitTests/**'
      - 'Orquestra.Utils/**'
      - 'Orquestra.sln'                
      - '.github/workflows/azure-webapps-dotnet-core.yml' 
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.x'           
  BUILD_CONFIGURATION: 'Release'   
  AZURE_WEBAPP_NAME: 'orquestra-api'  
  AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}  

jobs:
  # cleanup:
  #   name: Cleanup old artifacts
  #   runs-on: ubuntu-latest
  #   permissions:
  #     actions: write
  #     contents: read
  #   steps:
  #     - name: Delete old artifacts (keep last 10)
  #       run: |
  #         artifacts=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate -q '.artifacts | sort_by(.created_at) | reverse | .[10:] | .[].id')
  #         for artifact_id in $artifacts; do
  #           echo "Deleting artifact ID: $artifact_id"
  #           gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id
  #         done
  #       env:
  #         GH_TOKEN: ${{ github.token }}

  build-and-test:
    name: Build and test back-end
    runs-on: ubuntu-latest
 
    steps:
      # 1️⃣ Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET SDK
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3️⃣ Restaurar dependências de todos os projetos
      - name: Restore dependencies
        run: dotnet restore Orquestra.sln

      # 4️⃣ Build da solução
      - name: Build solution
        run: dotnet build Orquestra.sln --configuration ${{ env.BUILD_CONFIGURATION }}

      # 5️⃣ Executa testes unitários
      - name: Run unit tests
        run: dotnet test Orquestra.UnitTests/Orquestra.UnitTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --verbosity normal

      # 6️⃣ Executa testes de integração
      - name: Run integration tests
        run: dotnet test Orquestra.IntegrationTests/Orquestra.IntegrationTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --verbosity normal

      # 7️⃣ Publica projeto API
      - name: Publish API project
        run: dotnet publish Orquestra.API/Orquestra.API.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --output ${{ github.workspace }}/publish

      # 8️⃣ Lista arquivos publicados (debug)
      - name: List published files
        run: ls -R ${{ github.workspace }}/publish

      # 9️⃣ Faz upload do artifact para deploy
      - name: Upload artifact for deploy
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api
          path: publish/

  deploy:
    name: Deploy back-end
    runs-on: ubuntu-latest
    needs: build-and-test # Espera o job de build-and-test terminar

    steps:
      # 🔟 Download do artifact do job de build
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-api
          path: download/

      # 1️⃣1️⃣ Lista arquivos do artifact (debug)
      - name: List files in artifact
        run: ls -R download/

      # 1️⃣2️⃣ Deploy na Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: download/
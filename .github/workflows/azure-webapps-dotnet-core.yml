name: Build, Test and Deploy .NET API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.x'  
  BUILD_CONFIGURATION: 'Release'  
  AZURE_WEBAPP_NAME: 'orquestra'  
  AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}  

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orquestra.sln

      - name: Build solution
        run: dotnet build Orquestra.sln --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Run unit tests
        run: dotnet test Orquestra.UnitTests/Orquestra.UnitTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal

      - name: Run integration tests
        run: dotnet test Orquestra.IntegrationTests/Orquestra.IntegrationTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal

      - name: Publish API project
        run: dotnet publish Orquestra.API/Orquestra.API.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --output ${{ github.workspace }}/publish

      - name: List published files
        run: ls -R ${{ github.workspace }}/publish

      - name: Upload artifact for deploy
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api
          path: publish/

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-api
          path: download/

      - name: List files in artifact
        run: ls -R download/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: download/
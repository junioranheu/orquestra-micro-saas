name: Back-end | Build, Test & Deploy .NET API to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'Orquestra.API/**'             
      - 'Orquestra.Application/**'      
      - 'Orquestra.Domain/**'           
      - 'Orquestra.Infrastructure/**'   
      - 'Orquestra.IntegrationTests/**'
      - 'Orquestra.UnitTests/**'
      - 'Orquestra.Utils/**'
      - 'Orquestra.sln'                
      - '.github/workflows/azure-webapps-dotnet-core.yml'  
  workflow_dispatch: 

env:
  DOTNET_VERSION: '9.x'  
  BUILD_CONFIGURATION: 'Release'  
  AZURE_WEBAPP_NAME: 'orquestra-api'  
  AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}  

jobs:
  build:
    name: 🏗️ Build Back-end
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET SDK
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3️⃣ Restore dependências
      - name: Restore dependencies
        run: dotnet restore Orquestra.sln

      # 4️⃣ Build da solução
      - name: Build solution
        run: dotnet build Orquestra.sln --configuration ${{ env.BUILD_CONFIGURATION }}

      # 5️⃣ Publica projeto API
      - name: Publish API project
        run: dotnet publish Orquestra.API/Orquestra.API.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --output ${{ github.workspace }}/publish

      # 6️⃣ Upload do artifact para deploy
      - name: Upload artifact for deploy
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api
          path: publish/

  test:
    name: 🧪 Test Back-end
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 1️⃣ Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Testes unitários
      - name: Run unit tests
        run: dotnet test Orquestra.UnitTests/Orquestra.UnitTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --verbosity normal

      # 3️⃣ Testes de integração
      - name: Run integration tests
        run: dotnet test Orquestra.IntegrationTests/Orquestra.IntegrationTests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --verbosity normal

  deploy:
    name: 🚀 Deploy Back-end
    runs-on: ubuntu-latest
    needs: [build, test]  # só roda se build e test passarem
    steps:
      # 1️⃣ Download artifact
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-api
          path: download/

      # 2️⃣ Lista arquivos do artifact (opcional)
      - name: List files in artifact
        run: ls -R download/

      # 3️⃣ Deploy para Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: download/